<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f0f0f0;
        }
        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            border: 2px solid #333;
            background: white;
        }
        button:hover {
            background: #e0e0e0;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            min-height: 50px;
        }
    </style>
</head>
<body>
    <h1>🧪 Button Diagnostic Test</h1>
    <p>If these buttons work, the issue is in the main app code. If they don't, it's a browser/device issue.</p>

```
<button onclick="test1()">Test Button 1</button>
<button onclick="test2()">Test Button 2</button>
<button onclick="test3()">Test Button 3</button>

<div class="result" id="result">Click a button to test...</div>

<script>
    function test1() {
        document.getElementById('result').innerHTML = '✅ Button 1 works! onclick is functioning.';
        console.log('Test 1 clicked');
    }

    function test2() {
        document.getElementById('result').innerHTML = '✅ Button 2 works! JavaScript is running.';
        console.log('Test 2 clicked');
    }

    function test3() {
        document.getElementById('result').innerHTML = '✅ Button 3 works! Everything is good!';
        console.log('Test 3 clicked');
    }

    // Test if DOMContentLoaded fires
    document.addEventListener('DOMContentLoaded', () => {
        console.log('✅ DOMContentLoaded fired successfully');
        document.getElementById('result').innerHTML = '✅ Page loaded! Try clicking a button...';
    });

    console.log('✅ Script is running');
</script>
```

</body>
</html>
